camera:
  down_camera_name: down_camera
  image_rotation: none
  forward_dir_in_image: up

line_detection:
  black_threshold: 80
  min_mask_area: 300
  roi_y_min_ratio: 0.12
  roi_y_max_ratio: 0.88
  roi_x_min_ratio: 0.18
  roi_x_max_ratio: 0.82
  morph_kernel_size: 5

# Extended node detector.
# This replaces the old intersection-only detector.
# It can classify T, cross, and right-angle corner shapes such as ㄱ / ㄴ.
node_detection:
  enabled: true

  # Use a wide ROI because side branches of T/cross/corner nodes may be outside
  # the narrow line-following ROI.
  roi_y_min_ratio: 0.02
  roi_y_max_ratio: 0.98
  roi_x_min_ratio: 0.02
  roi_x_max_ratio: 0.98

  # Node candidate conditions.
  min_area: 3500
  projection_threshold_ratio: 0.45
  min_axis_peak_ratio: 0.16

  # Arm classification around the estimated node center.
  # If node detection is too insensitive, lower min_arm_length_ratio slightly.
  # If straight lines are falsely treated as corners, raise min_axis_peak_ratio
  # or min_arm_length_ratio.
  arm_band_ratio: 0.075
  min_arm_length_ratio: 0.10
  min_row_col_occupancy: 0.18
  center_gap_px: 6

  # We only want decision points now, not plain dead ends.
  dead_end_as_node: false

  # During normal entry-road following, this helps avoid treating a side-only
  # horizontal line as a decision node.
  require_longitudinal_arm: true

  # Centering controller. Positive forward_error means move forward; negative
  # means move backward.
  kp_forward: 1.0
  max_forward_speed_mps: 1.0
  kp_yaw: 1.0
  max_yaw_rate: 0.5
  yaw_sign: null

  center_lateral_tolerance: 0.05
  center_forward_tolerance: 0.05
  hold_center_frames: 6
  stop_when_centered: true
  
  accept_forward_error_min: -0.10
  
control:
  forward_speed_mps: 0.1
  kp_yaw: 1.0
  max_yaw_rate: 0.5
  yaw_sign: -1.0
  fixed_z: 1.0

lost_line:
  stop_when_lost: true
  search_when_lost: false

recovery:
  backtrack_on_line_lost: true
  backtrack_speed_mps: 1.0
  backtrack_max_yaw_rate: 1.2
  backtrack_position_tolerance_m: 0.05
  backtrack_yaw_tolerance_rad: 0.05

# After DFS exploration finishes at the root/entry node, return to the real start point.
# target=entry_start uses world.yaml entry_path.start_xy, e.g. (0,-5).
# If world.yaml is unavailable, use target=initial_pose.
return_home:
  enabled: true
  target: entry_start

  # After reverse ArUco revisit, first route through the visited topology graph
  # to the grid-side entry node.  Then move to entry_path.start_xy.
  # Keep fallback false for strict debugging: if the graph route is impossible, stop instead of cheating.
  use_graph_route_to_entry_node: true
  direct_fallback_if_graph_route_fails: false

  speed_mps: 1.0
  max_yaw_rate: 1.0
  position_tolerance_m: 0.05
  yaw_tolerance_rad: 0.05

# ArUco marker mission.
# expected_count=null means this is read from world.yaml marker.count.
aruco:
  enabled: true
  dictionary: DICT_4X4_50
  expected_count: null
  min_area_px: 400
  trigger_revisit_when_all_found: true
  draw_debug: true

# After all markers are found, visit remembered marker nodes in reverse detection order.
marker_revisit:
  enabled: true
  # After all ArUco markers are found, revisit only ArUco marker nodes.
  # If multiple marker IDs are bound to the same node, visit that node once.
  unique_nodes_only: true
  skip_duplicate_target_nodes: false

# Phase 2 planner. This is intentionally separated from the DFS exploration planner.
# Once all ArUco markers are found, do NOT follow the previous DFS route and do
# NOT use only visited topology edges.  Instead, compute the shortest route on
# the known rectangular grid from world.yaml.
marker_return:
  enabled: true
  planner: predefined_grid_shortest_path
  use_predefined_grid: true
  use_visited_topology_edges: false
  ordinary_nodes_reusable: true
  forbid_all_non_target_marker_nodes: true
  route_to_entry_after_markers: true
  direction_priority: [E, N, W, S]

debug:
  enabled: true
  window_scale: 1.0
  show_mask: true
  save_frames: false
  save_dir: project/debug_frames
  pseudo_odometry_map:
    enabled: true
    panel_size_px: 720
    padding_px: 36
    path_sample_distance_m: 0.08
    sample_node_radius_px: 2
    show_node_labels: true
    max_node_labels: 30
    save_panel: false
    save_panel_name: pseudo_odometry_map_latest.png

planner:
  enabled: true
  mode: true_dfs_stack
  use_true_dfs_stack: true
  decision_priority: [front, left, right, back]
  allow_backtracking: true
  allow_known_edge_reuse: false
  mark_attempted_edges: true
  node_rearm_distance_m: 0.65
  turn_kp_yaw: 2.2
  turn_max_yaw_rate: 0.85
  turn_yaw_tolerance_rad: 0.04
  leave_speed_mps: 0.18
  leave_distance_m: 0.45

  # v2 stabilization:
  # - after every planner decision, the robot is forced to align to global yaw
  # - while leaving a node, movement is along the global grid axis, not body yaw
  # - x/y is optionally snapped to the canonical map-node center before leaving
  leave_snap_to_node_center: true

  # v4 exploration policy:
  # Outside/entry-road edges are skipped during normal exploration.
  # Boundary nodes prefer inward branches before continuing around the perimeter.
  avoid_outside_edges: true
  allow_outside_edges: false
  prefer_inward_from_boundary: true

  # v6 anti-revisit policy:
  # Do not select an already discovered node as a new exploration target.
  # DFS parent backtracking is still allowed.
  avoid_revisited_nodes: true

  # Do not re-enter the grid-side entry/start node as a normal branch during exploration.
  # Return-home can be added later as a separate mode.
  avoid_entry_node_reentry: true

map:
  enabled: true
  world_config_path: project/config/world.yaml
  save_path: project/debug_frames/topology_map.json
  node_merge_distance_m: 0.35
  grid_snap_tolerance_m: 0.35
  coord_round_decimals: 2
